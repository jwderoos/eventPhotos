# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\Auth\GoogleOAuthClient:
        alias: App\Service\Auth\RealGoogleOAuthClient

    App\Service\Mail\DnsResolver:
        alias: App\Service\Mail\SystemDnsResolver

    App\Session\PdoSessionHandlerFactory:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    session.handler.pdo:
        class: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler
        factory: ['@App\Session\PdoSessionHandlerFactory', 'create']
        public: true

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true

        App\Tests\:
            resource: '../tests/'
            exclude:
                - '../tests/bootstrap.php'

        Symfony\Component\Clock\MockClock:
            arguments:
                $now: '2026-06-12 12:00:00'
                $timezone: 'UTC'

        Symfony\Component\Clock\ClockInterface:
            alias: Symfony\Component\Clock\MockClock
            public: true

        App\Tests\Fake\FakeGoogleOAuthClient:
            public: true
            arguments:
                $requestStack: '@request_stack'

        App\Service\Auth\GoogleOAuthClient:
            alias: App\Tests\Fake\FakeGoogleOAuthClient
            public: true

        App\Service\Session\UserSessionCreator:
            public: true

        App\EventListener\UserSessionLoginListener:
            public: true

        App\Service\Mail\OrganizerMailerResolver:
            public: true

        App\Tests\Mail\InMemoryTransportFactory:
            tags:
                - { name: 'mailer.transport_factory', priority: 100 }

        App\Tests\Mail\CapturedMail:
            public: true

        App\Tests\Fake\PrebakedDnsResolver:
            public: true

        App\Service\Mail\DnsResolver:
            alias: App\Tests\Fake\PrebakedDnsResolver

        App\Audit\AuditLogger:
            public: true

        App\Service\Event\EventArchiveExporter:
            public: true

        App\Service\Event\EventArchiveImporter:
            public: true
