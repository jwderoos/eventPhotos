security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|assets)/
            security: false

        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /admin
            logout:
                path: app_logout
                target: app_login
                # POST-only logout (route is methods=POST) with CSRF — prevents accidental sign-out
                # from link prefetchers (Turbo Drive hover-prefetch, link scanners, <img src> XSS).
                # csrf_parameter intentionally left at the default `_csrf_token`: the
                # csrf_protection_controller.js Stimulus controller matches inputs by that name
                # to set up the SameOrigin double-submit cookie. Renaming the input breaks the
                # JS double-submit and forces validation to fall back to the Origin/Referer
                # check, which is fragile behind reverse proxies (e.g. TrueNAS NPM).
                enable_csrf: true
                csrf_token_id: logout

    role_hierarchy:
        ROLE_ADMIN: [ROLE_ORGANIZER, ROLE_USER]
        ROLE_ORGANIZER: [ROLE_USER]

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/setup, roles: PUBLIC_ACCESS }
        - { path: ^/account, roles: ROLE_USER }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin/invites, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ORGANIZER }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
