# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Sessions live in Postgres via PdoSessionHandler (see config/services.yaml).
    # 30-day rolling cookie + GC lifetime so organizers don't get logged out between events.
    session:
        handler_id: session.handler.pdo
        cookie_lifetime: 2592000     # 30 days, rolling
        gc_maxlifetime: 2592000
        cookie_secure: auto
        cookie_samesite: lax
        cookie_httponly: true
        gc_probability: 1
        gc_divisor: 1000

    #esi: true
    #fragments: true

when@prod:
    framework:
        # Trust X-Forwarded-* headers from the reverse proxy in front of nginx.
        # TRUSTED_PROXIES=REMOTE_ADDR trusts the immediate upstream, which is
        # only safe because nothing else can reach the nginx container directly.
        trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
        trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix']

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
