framework:
    rate_limiter:
        # Coarse per-client-IP cap on the public event HTML/JSON routes (#23).
        # Blunts slug enumeration + request floods. 120/min ≈ 2 req/s — generous
        # for a human browsing a gallery, brutal for a sprayer. Photo-serve and
        # the lightbox neighbor route are NOT limited (see the listener allowlist).
        public_event:
            policy: 'sliding_window'
            limit: 120
            interval: '1 minute'
            cache_pool: 'rate_limiter.cache_pool'
        # Per-client-IP cap on visitor "notify me" signups (#77). Blunts mass
        # signup floods from a single source. Kept generous because many
        # legitimate visitors share one public IP (venue Wi-Fi, and mobile
        # carrier CGNAT that pools hundreds of subscribers behind one IPv4);
        # a low cap mass-blocks a live event. The real anti-abuse controls are
        # the per-email confirm_email_resend limiter below and the honeypot.
        visitor_email_signup:
            policy: 'sliding_window'
            limit: 100
            interval: '1 hour'
            cache_pool: 'rate_limiter.cache_pool'
        # Per-email cap on confirmation-email resends (#77). Closes the mail-bomb
        # vector where an attacker re-submits a victim's address repeatedly.
        confirm_email_resend:
            policy: 'sliding_window'
            limit: 1
            interval: '10 minutes'
            cache_pool: 'rate_limiter.cache_pool'
