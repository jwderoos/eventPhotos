name: eventfotos-prod

services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: php
    image: eventfotos-php:latest
    env_file:
      - .env.prod
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
    volumes:
      - ${DATA_DIR}/uploads:/app/var/uploads
      - ${DATA_DIR}/share:/app/var/share
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: eventfotos-php:latest
    command: php bin/console messenger:consume async failed -vv --time-limit=3600 --memory-limit=128M
    env_file:
      - .env.prod
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
    volumes:
      - ${DATA_DIR}/uploads:/app/var/uploads
      - ${DATA_DIR}/share:/app/var/share
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s

  migrate:
    image: eventfotos-php:latest
    command: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
    env_file:
      - .env.prod
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: nginx
    image: eventfotos-nginx:latest
    ports:
      - "${HOST_HTTP_PORT:-8081}:80"
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
