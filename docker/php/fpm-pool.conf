; PHP-FPM pool overrides for the prod image (§3.2). The base image ships a
; default www pool at dynamic / max_children=5. We deliberately replace those
; values with `pm = static, max_children = 24` so the spike that follows the
; notification email blast (#77) doesn't trigger child-spawn churn during the
; critical window. Sized for ~80 MB per child × 24 ≈ 2 GB resident, well under
; the §3.6 mem_limit of 3 GB on the php service.

[www]
user = www-data
group = www-data
listen = 9000

pm = static
pm.max_children = 24
; Recycle children after this many requests to bound memory growth from leaks.
pm.max_requests = 1000
