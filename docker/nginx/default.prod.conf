server {
    listen 80 default_server;
    server_name _;
    root /app/public;

    # Trust the upstream reverse proxy (NPM) headers.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # Upload ceiling matches PHP's upload_max_filesize (30M) plus headroom.
    client_max_body_size 32M;

    # Long-lived assets compiled by Symfony Asset Mapper (hashed filenames).
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_read_timeout 60s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
