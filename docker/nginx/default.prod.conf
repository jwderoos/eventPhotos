server {
    listen 80 default_server;
    server_name _;
    root /app/public;

    # Re-resolve the php upstream via Docker's embedded DNS instead of caching
    # the IP at config-load. Without this, recreating the php container (new
    # bridge IP) orphans nginx's cached upstream and every request 502s until
    # nginx is manually restarted. The variable in fastcgi_pass below forces
    # per-request resolution against this resolver.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Trust the upstream reverse proxy (NPM) headers.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # Upload ceiling matches PHP's upload_max_filesize (30M) plus headroom.
    client_max_body_size 32M;

    # §3.7 gzip text-ish responses on the internal hop. NPM probably gzips on
    # egress, but doing it here keeps us robust if NPM is bypassed and avoids
    # double-compression of already-binary payloads. JPEG is deliberately NOT
    # in gzip_types — pre-compressed bytes don't benefit and CPU is wasted.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Long-lived assets compiled by Symfony Asset Mapper (hashed filenames).
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Internal-only locations for X-Accel-Redirect from PhotoServeController.
    # Authorisation runs in PHP first; these aliases just push the bytes via sendfile.
    # Originals are deliberately NOT exposed here — they must never be web-reachable.
    location ^~ /_protected/thumbs/ {
        internal;
        alias /srv/photos/thumbs/;
    }

    location ^~ /_protected/previews/ {
        internal;
        alias /srv/photos/previews/;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $upstream_php php:9000;
        fastcgi_pass $upstream_php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_read_timeout 60s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
