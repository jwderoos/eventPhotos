server {
    listen 80 default_server;
    server_name _;
    root /app/public;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Internal-only locations for X-Accel-Redirect from PhotoServeController.
    # Authorisation runs in PHP first; these aliases just push the bytes via sendfile.
    # Originals are deliberately NOT exposed here — they must never be web-reachable.
    location ^~ /_protected/thumbs/ {
        internal;
        alias /srv/photos/thumbs/;
    }

    location ^~ /_protected/previews/ {
        internal;
        alias /srv/photos/previews/;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $upstream_php php:9000;
        fastcgi_pass $upstream_php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 32M;
}
