services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/app:delegated
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      MAILER_DSN: "smtp://mailer:1025"
      APP_ENV: dev
      PHP_IDE_CONFIG: "serverName=event-photos"
      INFERENCE_SERVICE_URL: "http://inference:8000"
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started

  tailwind:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php bin/console tailwind:build --watch
    volumes:
      - ./:/app:delegated
    working_dir: /app
    depends_on:
      - php

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php bin/console messenger:consume async failed -vv --time-limit=3600 --memory-limit=128M
    volumes:
      - ./:/app:delegated
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      MAILER_DSN: "smtp://mailer:1025"
      APP_ENV: dev
      INFERENCE_SERVICE_URL: "http://inference:8000"
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    depends_on:
      database:
        condition: service_healthy
      inference:
        condition: service_started

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./public:/app/public:ro
      # Read-only mounts for X-Accel-Redirect — PhotoServeController authorises,
      # nginx serves the bytes from these aliases. Originals are NOT mounted.
      - ./var/uploads/photos/thumbs:/srv/photos/thumbs:ro
      - ./var/uploads/photos/previews:/srv/photos/previews:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - php

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
